/* XP BAR */

.picturee{

<body>

<div id="overlay" onclick="toggleSidebar()"></div>

<div id="sidebar">
    <h3>📚 Menu</h3>
    <div class="menu-item" onclick="showHome()">🏠 Home</div>
    <div class="menu-item" onclick="showApps()">📱 App List</div>
    <div class="menu-item" onclick="showProgress()">📊 Progress</div>
    
    <div class="menu-item" onclick="africaOnline()">🌍 Main Application</div>
</div>

<div id="main">

<div id="topbar">
    <div id="menuBtn" onclick="toggleSidebar()">☰</div>
    <strong style="text-shadow: 1px 1px 2px teal;">AOAccess 📚 Web Browser</strong>
</div>

<h3 id="points">🏆 Points: 0 | Level: 1</h3>

<div id="xpContainer"><div id="xpBar"></div></div>

<input id="url" type="url" placeholder="Enter website..." onkeydown="if(event.key==='Enter') loadSite()" />
<br>
<button onclick="loadSite()">Search 🔎</button>
<button onclick="showApps()">App List 📱</button>

<div id="appGrid"></div><br>

<iframe id="view" src="about:blank"></iframe>

<div id="panel"></div>

</div>

<footer>&copy; 2026 Copyright SM Technology</footer>

<script>

/* CONSTANTS */
const HOME_URL = "https://connect-nbdv.onrender.com/";

/* SAFE STORAGE */
function safeParse(key, fallback) {
    try {
        const item = localStorage.getItem(key);
        return item ? JSON.parse(item) : fallback;
    } catch {
        return fallback;
    }
}

let myApps = [
{ name: "️📓 MSCE Pdf", url: "https://smtechnology133.github.io/africaonline/seniorSubjects.html" },

{ name: "📓 JCE Pdf", url: "https://smtechnology133.github.io/africaonline/juniorSubjects.html" },

    { name: "🐾 Kids App", url: "https://smtechnology133.github.io/africaonline/animalNames.html" },
    
    { name: "🔊 PDF to Speech", url: "https://smtechnology133.github.io/africaonline/PDFtoAudio.html" },
    
    { name: "📖 Text Editor", url: "https://smtechnology133.github.io/africaonline/textEditor.html" },
    
    { name: "📖 Wikipedia", url: "https://salmandascript.github.io/LinkWikipedia-/" },
    
    { name: "🛍 E-Store", url: "https://smtechnology133.github.io/OnlineShopping/onlineShopping.html" },
    
    { name: "👑 Head of State", url: "https://salmandascript.github.io/MyPresident2/index.html" },
    
    { name: "🔢 Matrix AI", url: "https://example.com/matrix" },
    
    { name: "🌍 Main App", url: "https://smtechnology133.github.io/africaonline/" }
];

let points = parseInt(localStorage.getItem("points") || 0);
let history = safeParse("history", []);
let lastLevel = Math.floor(points / 50) + 1;

function save() {
    localStorage.setItem("points", points);
    localStorage.setItem("history", JSON.stringify(history));
}

/* UI UTILS */
function toggleSidebar() {
    const s = document.getElementById("sidebar");
    const o = document.getElementById("overlay");
    const isOpen = s.classList.toggle("open");
    o.style.display = isOpen ? "block" : "none";
}

function clearUI() {
    document.getElementById("appGrid").innerHTML = "";
    const panel = document.getElementById("panel");
    panel.innerHTML = "";
    panel.style.display = "none";
}

/* AUDIO EFFECTS */
function playSound(freq=600){
    try{
        const ctx = new(window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.frequency.setValueAtTime(freq, ctx.currentTime);
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.1);
    } catch(e) { console.log("Audio blocked"); }
}

/* XP & PROGRESS SYSTEM */
function updatePointsDisplay(){
    const level = Math.floor(points / 50) + 1;
    const xp = points % 50;
    const percent = (xp / 50) * 100;

    document.getElementById("points").innerText = `🏆 Points: ${points} | Level: ${level}`;
    document.getElementById("xpBar").style.width = percent + "%";

    if(level > lastLevel){
        showToast("🔥 Level Up! Level " + level);
        playSound(800);
        lastLevel = level;
    }
}

function addPoints(a, type, name){
    points += a;
    history.push({type, name, points, time: Date.now()});
    if(history.length > 50) history.shift(); // Keep history manageable
    save();
    updatePointsDisplay();
}

function showToast(msg){
    const t = document.createElement("div");
    t.innerText = msg;
    t.style = "position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.8); color:white; padding:10px 20px; border-radius:8px; z-index:2000; border:1px solid orange;";
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2500);
}

/* NAVIGATION LOGIC */
function loadSite(){
    let url = document.getElementById("url").value.trim();
    if(!url) return;
    if(!url.includes(".")) url += ".com";
    if(!url.startsWith("http")) url = "https://" + url;

    const iframe = document.getElementById("view");
    iframe.src = url;
    
    // Attempt to catch iframe loading errors (Note: limited by Cross-Origin policy)
    iframe.onerror = () => showToast("⚠️ Site might be restricted");

    addPoints(5, "website", url);
    clearUI();
}

function showApps(){
    clearUI();
    const grid = document.getElementById("appGrid");
    grid.style.display = "grid";

    myApps.forEach(app => {
        const d = document.createElement("div");
        d.className = "app";
        d.innerText = app.name;
        d.onclick = () => {
            document.getElementById("view").src = app.url;
            addPoints(10, "app", app.name);
            clearUI();
        };
        grid.appendChild(d);
    });

    if(document.getElementById("sidebar").classList.contains("open")) toggleSidebar();
}

function showHome(){
    clearUI();
    document.getElementById("view").src = HOME_URL;
    const panel = document.getElementById("panel");
    panel.style.display = "block";
    panel.innerHTML = "<h3>🏠 Welcome</h3><p>Once 💬Connect has loaded successfully, let's chat, share PDF Books, Past Papers aswell as teach each other, good luck.</p>";

    if(document.getElementById("sidebar").classList.contains("open")) toggleSidebar();
}

function africaOnline(){
    addPoints(2, "menu", "Main Portal");
    showHome();
}

/* PROGRESS VISUALIZATION */
function showProgress(){
    clearUI();
    const panel = document.getElementById("panel");
    panel.style.display = "block";
    panel.innerHTML = "<h3>📊 Recent Activity</h3><canvas id='g' width='300' height='150' style='width:100%'></canvas>";
    drawGraph();
    if(document.getElementById("sidebar").classList.contains("open")) toggleSidebar();
}

function drawGraph(){
    const c = document.getElementById("g");
    if(!c) return;
    const ctx = c.getContext("2d");
    const data = history.slice(-10);
    
    if(data.length < 2) {
        ctx.fillStyle = "teal";
        ctx.textAlign = "center";
        ctx.fillText("Need more activity data to plot", 150, 75);
        return;
    }

    const w = c.width;
    const h = c.height;

    // Grid lines
    ctx.strokeStyle = "rgba(255,165,0,0.1)";
    for(let i=0; i<=4; i++) {
        ctx.beginPath();
        ctx.moveTo(0, i * h/4);
        ctx.lineTo(w, i * h/4);
        ctx.stroke();
    }

    // Graph path
    ctx.beginPath();
    ctx.strokeStyle = "orange";
    ctx.lineWidth = 8;
    ctx.shadowBlur = 10;
    ctx.shadowColor = "maroon";

    data.forEach((d, i) => {
        const x = i * (w / (data.length - 1));
        // Scale y based on points (normalized)
        const maxPts = Math.max(...data.map(o => o.points)) || 1;
        const y = h - (d.points / maxPts * (h - 20)) - 10;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();
    
    // Dots
    ctx.shadowBlur = 0;
    ctx.fillStyle = "teal";
    data.forEach((d, i) => {
        const x = i * (w / (data.length - 1));
        const maxPts = Math.max(...data.map(o => o.points)) || 1;
        const y = h - (d.points / maxPts * (h - 20)) - 10;
        ctx.beginPath();
        ctx.arc(x, y, 4, 0, Math.PI*2);
        ctx.fill();
    });
}

/* INITIALIZE */
window.onload = () => {
    updatePointsDisplay();
    showHome();
};

</script>

</body>
